<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- candlestick-like bars -->
  <g opacity="0.95">
    <rect x="96"  y="256" width="48" height="128" rx="10" fill="#1e1b4b"/>
    <rect x="112" y="208" width="16" height="32"  rx="4"  fill="#1e1b4b"/>
    <rect x="112" y="392" width="16" height="24"  rx="4"  fill="#1e1b4b"/>

    <rect x="184" y="176" width="48" height="208" rx="10" fill="#22c55e"/>
    <rect x="200" y="128" width="16" height="40"  rx="4"  fill="#22c55e"/>
    <rect x="200" y="392" width="16" height="24"  rx="4"  fill="#22c55e"/>

    <rect x="272" y="224" width="48" height="160" rx="10" fill="#ef4444"/>
    <rect x="288" y="176" width="16" height="40"  rx="4"  fill="#ef4444"/>
    <rect x="288" y="392" width="16" height="24"  rx="4"  fill="#ef4444"/>

    <rect x="360" y="144" width="48" height="240" rx="10" fill="#22c55e"/>
    <rect x="376" y="96"  width="16" height="40"  rx="4"  fill="#22c55e"/>
    <rect x="376" y="392" width="16" height="32"  rx="4"  fill="#22c55e"/>
  </g>
  <!-- trend line -->
  <path d="M96 320 L208 224 L296 288 L416 160"
        stroke="url(#line)" stroke-width="14" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
  <circle cx="416" cy="160" r="12" fill="#ffffff"/>
</svg>
