/* ══ 엑셀 불러오기 (단월 + 다중월 모두 지원) ══ */
function importExcel(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      // 통합 시트 또는 기존 출국 전/주재원 중 시트 모두 호환
      const preferred=wb.Sheets['통합']||wb.Sheets['출국 전']||wb.Sheets['주재원 중'];
      const targetSheet=preferred||wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(targetSheet,{header:1,defval:''});

      // ── 헤더 행에서 월 목록 추출 ──
      // 3행(index 2)에 "섹션","카테고리","항목명", 이후 YY.MM 형식 월들
      const headerRow=rows[2]||[];
      const monthCols=[];  // {col_index, month_str}
      headerRow.forEach((cell,ci)=>{
        const s=String(cell).trim();
        if(/^\d{2}\.\d{2}$/.test(s)) monthCols.push({ci,month:s});
      });

      let totalImported=0;
      const importedMonths=[];

      if(monthCols.length>0){
        // ── 다중월 모드 ──
        const availMonths=getMonths();
        monthCols.forEach(({ci,month})=>{
          if(!availMonths.includes(month))return;
          // 해당 월로 전환 후 VL 초기화
          const savedEM=EM;
          EM=month;
          const existing=AD[month];
          VL=existing?.vals?{...existing.vals}:{...DV_UNIFIED};

          rows.forEach(row=>{
            const itemRaw=String(row[2]||'').trim(); // C열=항목명
            const val=row[ci];
            if(!itemRaw||val===''||val===null||val===undefined||isNaN(parseFloat(val)))return;
            const eurName=itemRaw+' (€)';
            const matchKey=Object.prototype.hasOwnProperty.call(VL,eurName)?eurName
                          :Object.prototype.hasOwnProperty.call(VL,itemRaw)?itemRaw:null;
            if(!matchKey)return;
            VL[matchKey]=parseFloat(val)||0;
            totalImported++;
          });

          // 저장
          AD[month]={rev:Math.round(ss("rev")),exp:Math.round(ss("exp")),asset:Math.round(ss("ast")),liab:Math.round(ss("lib")),vals:{...VL}};
          sSet('fd_all',AD);sSet('fs_unified',SC);
          importedMonths.push(month);
          EM=savedEM;
        });
        // 화면은 현재 EM 기준으로 복원
        loadM(EM);

      } else {
        // ── 단월 모드 (기존 방식) ──
        let importedMonth='',importedRate=0;
        rows.forEach(row=>{
          const itemRaw=String(row[1]||'').trim();
          const val=row[2];
          const tip=String(row[4]||'').trim();
          if(!itemRaw||val===''||val===null||val===undefined)return;
          if(itemRaw==='입력 월 (YY.MM)'&&val){importedMonth=String(val).trim();return;}
          if(itemRaw==='€ 환율 (원/€)'&&val){importedRate=parseFloat(val)||0;return;}
          const eurName=itemRaw+' (€)';
          const matchKey=Object.prototype.hasOwnProperty.call(VL,eurName)?eurName
                        :Object.prototype.hasOwnProperty.call(VL,itemRaw)?itemRaw:null;
          if(!matchKey)return;
          VL[matchKey]=parseFloat(val)||0;
          if(tip){ITEM_TIPS[`tip__${matchKey}`]=tip;sSet('item_tips',ITEM_TIPS);}
          totalImported++;
        });
        if(importedRate>0) VL['__eur_rate__']=importedRate;
        if(importedMonth){const ms=getMonths();if(ms.includes(importedMonth))EM=importedMonth;}
        doSave();
        importedMonths.push(importedMonth||EM);
      }

      draw();
      const sm=document.getElementById('sm');
      if(sm){
        const label=importedMonths.length>1
          ?`✓ ${importedMonths.length}개월 불러옴 (${importedMonths[0]}~${importedMonths[importedMonths.length-1]})`
          :`✓ ${totalImported}개 항목 불러옴 (${importedMonths[0]||''})`;
        sm.textContent=label;
        setTimeout(()=>{if(sm)sm.textContent=''},4000);
      }
    }catch(err){
      alert('엑셀 읽기 실패: '+err.message+'\n'+err.stack);
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

/* ══ 전체 데이터 내보내기 / 불러오기 ══ */
function exportJSON(){
  const payload={
    version:6,
    exported:new Date().toISOString(),
    fd_all:sGet('fd_all')||AD||{},
    fs_unified:sGet('fs_unified')||null,
    // 구버전 호환을 위해 함께 저장
    fs_pre:sGet('fs_pre')||null,
    fs_post:sGet('fs_post')||null,
    bkt_targets:sGet('bkt_targets')||{},
    item_tips:sGet('item_tips')||{},
    mm_all:sGet('mm_all')||MONTH_MEMOS||{},
    yr_goals:sGet('yr_goals')||YEAR_GOALS||{},
    plan_cfg:sGet('plan_cfg')||PLAN_CFG,
    sim_cfg:sGet('sim_cfg')||SIM_CFG,
    goal_plan:sGet('goal_plan')||GOAL_PLAN,
    item_archived:sGet('item_archived')||ITEM_ARCHIVED||{},
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url; a.download=`재무대시보드_백업_${date}.json`;
  a.click(); URL.revokeObjectURL(url);
  const m=document.getElementById('backup-msg');
  if(m){m.textContent='✓ 저장됨';setTimeout(()=>{if(m)m.textContent=''},2500);}
}

function importJSON(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.version||(!d.fd_all&&!d.fd_pre)) throw new Error('올바른 백업 파일이 아닙니다');
      if(d.fd_all)  sSet('fd_all',  d.fd_all);
      else{ if(d.fd_pre) sSet('fd_pre',d.fd_pre); if(d.fd_post) sSet('fd_post',d.fd_post); }
      if(d.fs_unified) sSet('fs_unified',d.fs_unified);
      if(d.fs_pre)  sSet('fs_pre', d.fs_pre);
      if(d.fs_post) sSet('fs_post',d.fs_post);
      if(d.bkt_targets)  sSet('bkt_targets', d.bkt_targets);
      if(d.item_tips)    sSet('item_tips',   d.item_tips);
      if(d.mm_all)       sSet('mm_all',      d.mm_all);
      if(d.yr_goals)     sSet('yr_goals',    d.yr_goals);
      if(d.plan_cfg)     sSet('plan_cfg',    d.plan_cfg);
      if(d.sim_cfg)      sSet('sim_cfg',     d.sim_cfg);
      if(d.goal_plan)    sSet('goal_plan',   d.goal_plan);
      if(d.item_archived)sSet('item_archived',d.item_archived);
      // 상태 재초기화
      BKT_TARGETS=d.bkt_targets||{};
      ITEM_TIPS=d.item_tips||{};
      MONTH_MEMOS=d.mm_all||{};
      YEAR_GOALS=d.yr_goals||{};
      PLAN_CFG=Object.assign({newJeonse:420000000},d.plan_cfg||{});
      SIM_CFG=Object.assign({monthlySave:null,annualReturn:3,months:60},d.sim_cfg||{});
      GOAL_PLAN=Object.assign({target:1500000000,years:5,returnRate:5},d.goal_plan||{});
      ITEM_ARCHIVED=d.item_archived||{};
      AD=sGet('fd_all')||{};
      // 통합 스키마 리로드
      SC=sGet('fs_unified')||JSON.parse(JSON.stringify(DSC_UNIFIED));
      loadM(EM); draw();
      const m=document.getElementById('backup-msg');
      const cnt_all=Object.keys(AD).length;
      if(m){
        m.textContent=`✓ 복원 완료 (${cnt_all}개월 데이터)`;
        setTimeout(()=>{if(m)m.textContent=''},4000);
      }
    }catch(err){alert('불러오기 실패: '+err.message);}
    input.value='';
  };
  reader.readAsText(file);
}

  h+=`<div class="top"><div><h1>₩ 개인 재무제표</h1><div style="font-size:12px;color:#6b7280;margin-top:4px">양상운 가계 &nbsp;|&nbsp; ${EM} &nbsp;<span class="badge">${ph}</span></div></div><div style="color:#9ca3af;font-size:11px">출력: ${new Date().toLocaleDateString("ko")}</div></div>`;

  h+=`<div class="g2">`;
  [{s:"ast",lb:"자산",cl:"#3b82f6"},{s:"lib",lb:"부채",cl:"#f59e0b"},{s:"rev",lb:"수익",cl:"#10b981"},{s:"exp",lb:"지출",cl:"#ef4444"}].forEach(({s,lb,cl})=>{
    h+=`<div class="sec"><div class="stl" style="color:${cl}"><span>${lb}</span><span>${commas(Math.round(ss(s)))}원</span></div>`;
    SC[s].forEach(g=>{const sub=g.items.reduce((a,i)=>a+(parseFloat(VL[i])||0),0);h+=`<div class="cat"><span>${g.cat}</span><span>${commas(Math.round(sub))}</span></div>`;g.items.forEach(i=>{h+=`<div class="item"><span>${i}</span><span>${commas(parseFloat(VL[i])||0)}</span></div>`})});
    h+=`</div>`;
  });
  h+=`</div><div class="fcf" style="border-color:${ni>=0?"#10b981":"#ef4444"};color:${ni>=0?"#10b981":"#ef4444"}">순수익 ${ni>0?"+":""}${commas(Math.round(ni))}원</div></body></html>`;
  const w=window.open("","_blank");w.document.write(h);w.document.close();setTimeout(()=>w.print(),500);
}

let HELP_PAGE='intro';
function openHelp(){
  document.getElementById('help-overlay').classList.add('on');
  renderHelp();
}
function closeHelp(){document.getElementById('help-overlay').classList.remove('on')}
function setHelpPage(id){HELP_PAGE=id;renderHelp()}
function renderHelp(){
  const tabs=document.getElementById('help-tabs');
  const bd=document.getElementById('help-bd');
  if(!tabs||!bd)return;
  tabs.innerHTML=HELP_PAGES.map(p=>`<button class="${HELP_PAGE===p.id?'on':''}" onclick="setHelpPage('${p.id}')">${p.label}</button>`).join('');
  const pg=HELP_PAGES.find(p=>p.id===HELP_PAGE)||HELP_PAGES[0];
  bd.innerHTML=pg.html;
  bd.scrollTop=0;
}

/* ══ v6/v7: 키보드 단축키 ══ */
function setupKeybinds(){
  document.addEventListener('keydown',e=>{
    const tag=(e.target.tagName||'').toLowerCase();
    const typing=tag==='input'||tag==='textarea'||tag==='select';
    const mod=e.ctrlKey||e.metaKey;
    // ESC → 도움말 닫기
    if(e.key==='Escape'){
      const ov=document.getElementById('help-overlay');
      if(ov&&ov.classList.contains('on')){closeHelp();return;}
    }
    // Ctrl/Cmd + S → 저장
    if(mod&&e.key.toLowerCase()==='s'){e.preventDefault();doSave();return;}
    // Ctrl/Cmd + B → 백업 내보내기
    if(mod&&e.key.toLowerCase()==='b'){e.preventDefault();exportJSON();return;}
    // Ctrl/Cmd + ← / → : 월 전환 (월별입력 탭에서만)
    if(mod&&CT===1&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
      e.preventDefault();
      const ms=getMonths();const idx=ms.indexOf(EM);
      if(idx<0)return;
      const next=e.key==='ArrowLeft'?Math.max(0,idx-1):Math.min(ms.length-1,idx+1);
      if(next!==idx){sync();loadM(ms[next]);draw();}
      return;
    }
    if(typing)return;
    // 1~6 → 탭 전환
    if(/^[1-6]$/.test(e.key)){
      const idx=+e.key-1;
      if(idx<TABS_ALL.length){setT(idx);}
      return;
    }
    // ? → 도움말 모달 열기
    if(e.key==='?'||(e.shiftKey&&e.key==='/')){
      openHelp();
    }
  });
}

/* ══ Init ══ */
(function(){
  BKT_TARGETS=sGet('bkt_targets')||{};
  ITEM_TIPS=sGet('item_tips')||{};
  MONTH_MEMOS=sGet('mm_all')||(()=>{
    // 구버전 마이그레이션
    const pre=sGet('mm_pre')||{}, post=sGet('mm_post')||{};
    return {...pre,...post};
  })();
  YEAR_GOALS=sGet('yr_goals')||{};
  PLAN_CFG=Object.assign({newJeonse:420000000},sGet('plan_cfg')||{});
  SIM_CFG=Object.assign({monthlySave:null,annualReturn:3,months:60},sGet('sim_cfg')||{});
  GOAL_PLAN=Object.assign({target:1500000000,years:5,returnRate:5},sGet('goal_plan')||{});
  ITEM_ARCHIVED=sGet('item_archived')||{};
  // fd_all 우선, 없으면 구버전 fd_pre+fd_post 병합
  let stored=sGet('fd_all');
  if(!stored){
    const pre=sGet('fd_pre')||{}, post=sGet('fd_post')||{};
    stored={...pre,...post};
  }
  AD=stored;
  if(!Object.keys(AD).length) HIST.forEach(h=>{AD[h.ym]={rev:h.rev,exp:h.exp,asset:h.asset,liab:h.liab}});
  // v6: 통합 스키마 우선. 기존 fs_pre/fs_post만 있으면 병합(카테고리·항목 union) 후 저장
  SC=sGet('fs_unified');
  if(!SC){
    const pre=sGet('fs_pre'),post=sGet('fs_post');
    if(pre||post){
      SC={rev:[],exp:[],ast:[],lib:[]};
      ['rev','exp','ast','lib'].forEach(s=>{
        const catMap=new Map();
        [pre,post].forEach(src=>{
          if(!src||!src[s])return;
          src[s].forEach(g=>{
            if(!catMap.has(g.cat))catMap.set(g.cat,new Set());
            g.items.forEach(it=>catMap.get(g.cat).add(it));
          });
        });
        SC[s]=[...catMap].map(([cat,items])=>({cat,items:[...items]}));
      });
    } else {
      SC=JSON.parse(JSON.stringify(DSC_UNIFIED));
    }
    sSet('fs_unified',SC);
  }
  EM=getMonths()[0];loadM(EM);draw();
  setupKeybinds();
})();
</script>
