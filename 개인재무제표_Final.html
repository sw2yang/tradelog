<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개인 재무제표 v8 — 자산 증식 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07101f;--card:#0d1829;--alt:#132035;--bdr:#1a2d46;
  --blue:#3b82f6;--cyan:#06b6d4;--grn:#10b981;--red:#ef4444;
  --amb:#f59e0b;--pur:#8b5cf6;
  --t1:#eef2f7;--t2:#8da4bf;--t3:#4a6180;

  /* ── 타입 스케일 4단계 ── */
  --fs-xs:11px;   /* 보조: 단위·뱃지·힌트·날짜 */
  --fs-sm:13px;   /* 라벨: 카테고리명·KPI 설명·탭 */
  --fs-md:15px;   /* 본문: 항목명·입력값·일반 텍스트 */
  --fs-lg:20px;   /* 강조: 섹션 합계·KPI 숫자 */
  --fs-xl:26px;   /* 헤더: 섹션 타이틀 */

  --fw-reg:400;
  --fw-med:600;
  --fw-bold:700;
  --fw-black:800;
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,system-ui,"Malgun Gothic",sans-serif;font-size:var(--fs-md);line-height:1.6;min-height:100vh}

/* ── Header ── */
.hdr{background:#0a1525;border-bottom:1px solid var(--bdr);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left h1{font-size:18px;font-weight:var(--fw-black);letter-spacing:-.3px}
.hdr-left h1 em{color:var(--cyan);font-style:normal}
.hdr-left .sub{font-size:var(--fs-xs);color:var(--t3);margin-top:2px}
/* v6: phase-badge 제거됨 — 통합 양식으로 전환 */
.hs{display:flex;gap:24px}
.hs>div{text-align:right}
.hs small{font-size:var(--fs-xs);color:var(--t3);display:block;margin-bottom:2px}
.hs b{font-size:var(--fs-sm);font-weight:var(--fw-bold)}
@media(max-width:800px){.hs{display:none}}

/* v6: phase-bar 제거됨 */
.progress-info{font-size:var(--fs-xs);color:var(--t3)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;padding:8px 40px;background:var(--card);border-bottom:1px solid var(--bdr);overflow-x:auto}
.tabs button{padding:8px 18px;border-radius:7px;border:none;cursor:pointer;font-size:var(--fs-sm);font-weight:var(--fw-med);background:transparent;color:var(--t2);white-space:nowrap}
.tabs button.on{font-weight:var(--fw-bold);background:var(--blue);color:#fff}

/* ── Layout ── */
.mn{padding:40px 64px;max-width:1100px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
.rw{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:800px){.g2,.mn{grid-template-columns:1fr;padding:20px 20px}}

/* ── Cards (차트용) ── */
.cd{background:var(--card);border-radius:16px;border:1px solid var(--bdr);overflow:hidden;margin-bottom:32px}
.ch{padding:16px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.ch .dt{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.ch b{font-size:var(--fs-sm);font-weight:var(--fw-bold);flex:1}
.cb{padding:22px 24px}

/* ── Section card — 풀와이드 1열 ── */
.sec-cd{border-radius:18px;border:1px solid var(--bdr);overflow:hidden;margin-bottom:36px}
.sec-hd{padding:22px 32px;display:flex;align-items:center;justify-content:space-between}
.sec-hd .sec-label{font-size:var(--fs-xl);font-weight:var(--fw-black);letter-spacing:-.5px}
.sec-hd .sec-total{font-size:var(--fs-xl);font-weight:var(--fw-black);letter-spacing:-.5px}
.sec-body{padding:20px 32px 28px}

/* ── KPI tiles ── */
.kp{background:var(--alt);border-radius:12px;padding:18px 20px;border:1px solid var(--bdr);flex:1;min-width:120px}
.kp.w{border-color:rgba(239,68,68,.3)}
.kp small{font-size:var(--fs-xs);color:var(--t3);display:block;margin-bottom:6px;font-weight:var(--fw-med);letter-spacing:.04em;text-transform:uppercase}
.kp strong{font-size:var(--fs-lg);font-weight:var(--fw-black);display:block;line-height:1.15;letter-spacing:-.3px}
.kp .sub{font-size:var(--fs-xs);color:var(--t3);margin-top:4px}

/* ── 카테고리 행 ── */
.cr{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--alt);border-radius:8px;margin-bottom:4px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--t2)}
.cr .nm{flex:1;cursor:pointer}
.cr .st{font-weight:var(--fw-bold)}
.cr button{background:none;border:none;cursor:pointer;color:var(--t3);font-size:var(--fs-md);padding:0 4px;line-height:1}
.cr .x{color:rgba(239,68,68,.5);font-size:var(--fs-xs)}

/* ── 항목 행 ── */
.ir{display:flex;align-items:center;padding:11px 14px 11px 28px;border-bottom:1px solid rgba(26,45,70,.18);gap:12px}
.ir .nm{flex:1;font-size:var(--fs-md);color:var(--t2);cursor:pointer}
.ir input{background:#0a1422;border:1px solid var(--bdr);border-radius:7px;padding:8px 14px;color:var(--cyan);font-size:var(--fs-md);font-weight:var(--fw-bold);width:170px;text-align:right;outline:none;transition:border-color .15s}
.ir input:focus{border-color:var(--cyan)}
.ir .u{font-size:var(--fs-xs);color:var(--t3);white-space:nowrap}
.ir .x{background:none;border:none;cursor:pointer;color:rgba(239,68,68,.4);font-size:var(--fs-xs);padding:0 4px}
.sf{display:flex;justify-content:space-between;align-items:center;padding:16px 14px 4px;margin-top:10px}

/* ── 대시보드 요약 행 ── */
.vc{display:flex;justify-content:space-between;padding:8px 12px;background:var(--alt);border-radius:6px;margin-bottom:4px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--t2)}
.vi{display:flex;justify-content:space-between;padding:7px 12px 7px 22px;border-bottom:1px solid rgba(26,45,70,.15);font-size:var(--fs-md)}
.vi .vl{font-weight:var(--fw-med)}

/* ── Buttons ── */
.sv{padding:9px 22px;border-radius:8px;border:none;background:var(--cyan);color:#000;font-weight:var(--fw-bold);font-size:var(--fs-sm);cursor:pointer}
.pf{padding:9px 18px;border-radius:8px;border:1px solid var(--pur);background:transparent;color:var(--pur);font-weight:var(--fw-bold);font-size:var(--fs-sm);cursor:pointer}
.sb{padding:5px 12px;border-radius:7px;border:none;font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;color:#fff}

/* ── Hint ── */
.ht{padding:12px 16px;background:var(--alt);border-radius:10px;font-size:var(--fs-xs);color:var(--t3);margin-bottom:22px;line-height:1.8}

/* ── 건전성 지표 ── */
.idr{display:flex;align-items:center;padding:13px 16px;border-radius:10px;background:var(--alt);gap:12px;margin-bottom:8px}
.idr .n{flex:0 0 120px;font-weight:var(--fw-med);font-size:var(--fs-md)}
.idr .v{flex:0 0 100px;font-weight:var(--fw-black);font-size:var(--fs-lg);text-align:right}
.idr .s{flex:0 0 70px;font-size:var(--fs-xs);color:var(--t3);text-align:center}
.idr .d{flex:1;font-size:var(--fs-xs);color:var(--t3)}
.bdg{padding:3px 10px;border-radius:16px;font-size:var(--fs-xs);font-weight:var(--fw-bold)}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--t2);border-bottom:1px solid var(--bdr);text-align:right;letter-spacing:.04em;text-transform:uppercase}
td{padding:8px 10px;font-size:var(--fs-sm);border-bottom:1px solid rgba(26,45,70,.15);text-align:right}

/* ── Charts ── */
.cw{position:relative;height:280px}

/* ── Checklist ── */
.ck-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.ck-item:hover{background:var(--alt)}
.ck-item.done{opacity:.5}
.ck-box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--bdr);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);transition:all .15s}
.ck-item.done .ck-box{background:var(--grn);border-color:var(--grn)}
.ck-content{flex:1}
.ck-title{font-size:var(--fs-md);font-weight:var(--fw-med)}
.ck-desc{font-size:var(--fs-xs);color:var(--t3);margin-top:3px;line-height:1.6}
.ck-item.done .ck-title{text-decoration:line-through;color:var(--t3)}
.ck-amt{font-size:var(--fs-sm);font-weight:var(--fw-bold);white-space:nowrap;padding-top:2px}
.ck-sec{font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--t3);padding:14px 4px 6px;letter-spacing:.08em;text-transform:uppercase}

/* ── Bucket ── */
.bkt{border-radius:12px;padding:20px 24px;border:1px solid var(--bdr);margin-bottom:12px}
.bkt-title{font-size:var(--fs-md);font-weight:var(--fw-bold);margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline}
.bkt-bar-bg{background:rgba(255,255,255,.07);border-radius:4px;height:6px;margin-bottom:10px;overflow:hidden}
.bkt-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bkt-items{font-size:var(--fs-sm);color:var(--t2);line-height:1.8}

/* ── Currency toggle ── */
.cur-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--bdr);font-size:var(--fs-xs);font-weight:var(--fw-bold);cursor:pointer;background:transparent;color:var(--t3);transition:all .15s;flex-shrink:0}
.cur-btn.eur{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.12);color:#fbbf24}
.cur-btn.krw{border-color:var(--bdr);color:var(--t3)}

/* ── EUR rate bar ── */
.eur-bar{display:flex;align-items:center;gap:14px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:14px 20px;margin-bottom:22px;flex-wrap:wrap}
.eur-bar label{font-size:var(--fs-sm);color:#fbbf24;font-weight:var(--fw-bold)}
.eur-rate-input{background:#0a1422;border:1px solid rgba(251,191,36,.35);border-radius:7px;padding:8px 14px;color:#fbbf24;font-size:var(--fs-md);font-weight:var(--fw-bold);width:130px;text-align:right;outline:none}
.eur-rate-input:focus{border-color:#fbbf24}
.eur-badge{font-size:var(--fs-xs);background:rgba(251,191,36,.12);color:#fbbf24;padding:2px 9px;border-radius:10px;font-weight:var(--fw-bold)}
.ir.eur{border-left:2px solid rgba(251,191,36,.4)}
.ir .eur-equiv{font-size:var(--fs-xs);color:var(--t3);margin-left:4px;white-space:nowrap}

/* ── Item tip ── */
.ir-wrap{border-bottom:1px solid rgba(26,45,70,.18)}
.ir-wrap .ir{border-bottom:none}
.item-tip-input{width:100%;background:transparent;border:none;outline:none;font-size:var(--fs-xs);color:var(--t3);font-family:inherit;resize:none;padding:2px 14px 8px 28px;line-height:1.6;display:block}
.item-tip-input::placeholder{color:var(--t3);opacity:.4}

/* ── Bucket target edit ── */
.bkt-target-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bkt-target-label{font-size:var(--fs-xs);color:var(--t3)}
.bkt-target-input{background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:7px;padding:6px 12px;color:var(--t2);font-size:var(--fs-sm);font-weight:var(--fw-bold);width:160px;text-align:right;outline:none;transition:border-color .15s}
.bkt-target-input:focus{border-color:var(--cyan);color:var(--t1)}

/* ── Month select ── */
.month-sel{background:var(--alt);border:1px solid var(--bdr);border-radius:9px;color:var(--t1);padding:9px 16px;font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer;outline:none}
.month-sel:focus{border-color:var(--cyan)}

/* ── v6: KPI delta ── */
.kp .dlt{display:block;font-size:var(--fs-xs);margin-top:4px;font-weight:var(--fw-bold);letter-spacing:-.2px}
.kp .dlt.up{color:var(--grn)}
.kp .dlt.dn{color:var(--red)}
.kp .dlt.flat{color:var(--t3)}

/* ── v6: Period filter ── */
.pd-filter{display:inline-flex;gap:2px;background:var(--alt);border-radius:8px;padding:3px;margin-left:auto}
.pd-filter button{padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-size:var(--fs-xs);font-weight:var(--fw-bold);background:transparent;color:var(--t3)}
.pd-filter button.on{background:var(--blue);color:#fff}

/* ── v6: Goal progress bar ── */
.gl-prog{margin-top:8px}
.gl-prog-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:4px}
.gl-prog-fill{height:100%;border-radius:3px;transition:width .4s}
.gl-amt-row{display:flex;gap:8px;margin-top:6px;font-size:var(--fs-xs);color:var(--t3);align-items:center}
.gl-amt-input{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:5px;padding:3px 8px;color:var(--t2);font-size:var(--fs-xs);font-weight:var(--fw-bold);width:110px;text-align:right;outline:none}
.gl-amt-input:focus{border-color:var(--cyan);color:var(--t1)}

/* ── v6: Simulation ── */
.sim-ctrl{display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:var(--alt);border-radius:12px;padding:14px 20px;margin-bottom:18px;border:1px solid var(--bdr)}
.sim-ctrl label{font-size:var(--fs-xs);color:var(--t3);font-weight:var(--fw-bold);letter-spacing:.04em;text-transform:uppercase}
.sim-ctrl input[type=number]{background:#0a1422;border:1px solid var(--bdr);border-radius:7px;padding:6px 12px;color:var(--t1);font-size:var(--fs-sm);font-weight:var(--fw-bold);width:120px;text-align:right;outline:none}
.sim-ctrl input[type=number]:focus{border-color:var(--pur)}
.sim-ctrl input[type=range]{accent-color:var(--pur);width:160px}
.sim-res{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.sim-res .kp{border-color:rgba(139,92,246,.25);background:rgba(139,92,246,.05)}

/* ── v6: Keyboard hint ── */
.kbd-hint{display:inline-block;padding:1px 6px;border:1px solid var(--bdr);border-radius:4px;font-size:10px;font-family:ui-monospace,monospace;color:var(--t3);background:var(--alt);margin-left:4px}

/* ── v7: 이달의 진단 카드 ── */
.diag-card{background:linear-gradient(135deg,rgba(6,182,212,.07),rgba(139,92,246,.07));border:1px solid rgba(6,182,212,.25);border-radius:16px;padding:20px 26px;margin-bottom:26px}
.diag-card .title{font-size:var(--fs-sm);color:var(--cyan);font-weight:var(--fw-black);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.diag-card .line{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:var(--fs-md);line-height:1.6;color:var(--t1)}
.diag-card .line .icon{flex-shrink:0;font-size:16px;line-height:1}
.diag-card .line.bad{color:#fca5a5}
.diag-card .line.warn{color:#fcd34d}
.diag-card .line.good{color:#6ee7b7}
.diag-card .line.info{color:var(--t2)}

/* ── v7: 종합 건전성 게이지 ── */
.health-wrap{display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:center;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:22px 26px;margin-bottom:26px}
.health-gauge{position:relative;width:220px;height:140px}
.health-gauge canvas{width:100%!important;height:100%!important}
.health-gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px;pointer-events:none}
.health-gauge .score{font-size:42px;font-weight:var(--fw-black);line-height:1;letter-spacing:-1px}
.health-gauge .label{font-size:var(--fs-xs);color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.health-bars{display:grid;grid-template-columns:1fr;gap:9px}
.h-bar-row{display:grid;grid-template-columns:90px 1fr 70px 50px;gap:10px;align-items:center;font-size:var(--fs-sm)}
.h-bar-row .n{color:var(--t2);font-weight:600}
.h-bar-row .v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.h-bar-row .bdg{text-align:center;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:700}
.h-bar{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.h-bar-fill{height:100%;border-radius:4px;transition:width .5s}
@media(max-width:800px){.health-wrap{grid-template-columns:1fr}.health-gauge{margin:0 auto}}

/* ── v7: 자산구성 / 현금흐름 ── */
.alloc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:26px}
@media(max-width:900px){.alloc-wrap{grid-template-columns:1fr}}
.alloc-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;overflow:hidden}
.alloc-hd{padding:16px 22px;border-bottom:1px solid var(--bdr);font-size:var(--fs-sm);font-weight:700;display:flex;align-items:center;gap:8px}
.alloc-bd{padding:20px 22px}
.alloc-legend{display:flex;flex-direction:column;gap:7px;margin-top:14px}
.alloc-legend .row{display:grid;grid-template-columns:10px 1fr auto auto;gap:8px;align-items:center;font-size:var(--fs-sm)}
.alloc-legend .dot{width:10px;height:10px;border-radius:3px}
.alloc-legend .pct{color:var(--t3);font-size:var(--fs-xs);font-weight:700;min-width:42px;text-align:right}
.alloc-legend .amt{font-weight:700;font-variant-numeric:tabular-nums;min-width:88px;text-align:right}

/* ── v7: Waterfall 폭포 ── */
.wf-row{display:grid;grid-template-columns:110px 1fr 110px;gap:10px;align-items:center;padding:6px 0;font-size:var(--fs-sm)}
.wf-row .n{color:var(--t2);font-weight:600}
.wf-row .v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.wf-bar-bg{position:relative;height:22px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden}
.wf-bar{position:absolute;top:0;bottom:0;border-radius:4px;transition:all .4s}
.wf-total-row{border-top:1px solid var(--bdr);margin-top:8px;padding-top:10px;font-weight:800}

/* ── v7: 지출 TOP 리스트 ── */
.top-exp{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px 24px;margin-bottom:26px}
.top-exp-title{font-size:var(--fs-sm);font-weight:700;margin-bottom:14px;color:var(--t1)}
.top-exp-row{display:grid;grid-template-columns:1fr 120px 90px;gap:14px;align-items:center;padding:9px 0;border-bottom:1px dashed rgba(26,45,70,.4);font-size:var(--fs-sm)}
.top-exp-row:last-child{border-bottom:none}
.top-exp-row .n{color:var(--t1);font-weight:600}
.top-exp-row .n small{color:var(--t3);font-weight:400;margin-left:6px}
.top-exp-row .v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.top-exp-row .d{text-align:right;font-size:var(--fs-xs);font-weight:700}
.top-exp-row .d.up{color:var(--red)}
.top-exp-row .d.dn{color:var(--grn)}
.top-exp-row .d.flat{color:var(--t3)}

/* ═══════════════════════════════════════════
   v8: 자산 증식 인사이트 신규 CSS
═══════════════════════════════════════════ */

/* 오늘의 행동 제안 카드 */
.action-card{background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(6,182,212,.08));border:1px solid rgba(139,92,246,.3);border-radius:18px;padding:22px 26px;margin-bottom:26px;position:relative;overflow:hidden}
.action-card::before{content:'';position:absolute;top:0;right:0;width:140px;height:140px;background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);pointer-events:none}
.action-card .tag{display:inline-block;padding:3px 10px;background:rgba(139,92,246,.2);color:#c4b5fd;border-radius:12px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.action-card h3{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.action-card h3 .icon{font-size:24px}
.action-card .body{font-size:14px;line-height:1.7;color:var(--t1);margin-bottom:12px}
.action-card .cta{display:inline-block;padding:8px 14px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);border-radius:10px;font-size:13px;color:#c4b5fd;font-weight:600}

/* 관점 토글 */
.view-toggle{display:flex;gap:4px;background:var(--alt);border-radius:11px;padding:4px;margin-bottom:24px;align-self:center;border:1px solid var(--bdr)}
.view-toggle button{flex:1;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:var(--fs-sm);font-weight:700;background:transparent;color:var(--t3);transition:all .15s}
.view-toggle button.on{color:#000}
.view-toggle button.on.growth{background:linear-gradient(135deg,var(--pur),var(--cyan));color:#fff}
.view-toggle button.on.defense{background:linear-gradient(135deg,var(--grn),var(--cyan));color:#fff}
.view-toggle-wrap{display:flex;justify-content:center;margin-bottom:22px}
.view-toggle-wrap .hint{font-size:var(--fs-xs);color:var(--t3);margin-left:12px;align-self:center}

/* 자산 증가 원천 분해 */
.attrib-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:26px}
.attrib-hd{padding:16px 22px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;font-size:var(--fs-sm);font-weight:700}
.attrib-bd{padding:20px 22px}
.attrib-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
@media(max-width:640px){.attrib-summary{grid-template-columns:1fr}}
.attrib-box{padding:12px 14px;border-radius:10px;background:var(--alt);border:1px solid var(--bdr)}
.attrib-box .lbl{font-size:var(--fs-xs);color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.attrib-box .val{font-size:16px;font-weight:800;line-height:1.2}
.attrib-box .sub{font-size:var(--fs-xs);color:var(--t3);margin-top:3px}
.attrib-chart{position:relative;height:240px}

/* 수동 소득 비율 */
.pir-card{background:linear-gradient(135deg,rgba(16,185,129,.07),rgba(6,182,212,.05));border:1px solid rgba(16,185,129,.25);border-radius:16px;padding:22px 26px;margin-bottom:26px}
.pir-card .tit{font-size:var(--fs-sm);font-weight:800;color:var(--grn);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pir-main{display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:center}
@media(max-width:800px){.pir-main{grid-template-columns:1fr}}
.pir-pct{font-size:56px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--grn)}
.pir-pct small{font-size:24px;color:var(--t3)}
.pir-meaning{font-size:14px;color:var(--t1);line-height:1.7}
.pir-meaning b{color:var(--grn)}
.pir-bar-wrap{margin-top:14px}
.pir-bar-bg{height:10px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden;margin-bottom:6px;position:relative}
.pir-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--grn),var(--cyan));transition:width .6s}
.pir-bar-marks{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);font-weight:700}
.pir-stats{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;font-size:var(--fs-xs);color:var(--t3)}
.pir-stats b{color:var(--t1);font-weight:700}

/* 유휴 현금 경고 */
.idle-card{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(239,68,68,.04));border:1px solid rgba(245,158,11,.28);border-radius:14px;padding:18px 22px;margin-bottom:26px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center}
@media(max-width:640px){.idle-card{grid-template-columns:1fr}}
.idle-card .lbl{font-size:var(--fs-xs);color:var(--amb);font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.idle-card .body{font-size:14px;color:var(--t1);line-height:1.6}
.idle-card .body b{color:#fcd34d}
.idle-card .opp{text-align:right}
.idle-card .opp-val{font-size:22px;font-weight:900;color:#fcd34d;line-height:1}
.idle-card .opp-sub{font-size:11px;color:var(--t3);margin-top:4px;font-weight:600}

/* 복리 시뮬레이션 강화 */
.sim-v2{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px 24px;margin-bottom:26px}
.sim-v2-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:var(--fs-sm);font-weight:800}
.sim-rate-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.sim-rate-row .lbl{font-size:var(--fs-xs);color:var(--t3);font-weight:700;margin-right:6px}
.sim-rate-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--t2);font-size:var(--fs-xs);font-weight:700;cursor:pointer}
.sim-rate-btn.on{background:var(--pur);color:#fff;border-color:var(--pur)}
.sim-result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:800px){.sim-result-grid{grid-template-columns:1fr}}
.sim-result-box{padding:14px 16px;border-radius:10px;background:var(--alt);border-left:3px solid var(--pur)}
.sim-result-box .lbl{font-size:var(--fs-xs);color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.sim-result-box .val{font-size:18px;font-weight:800;color:var(--t1);line-height:1.2}
.sim-result-box .sub{font-size:var(--fs-xs);color:var(--t3);margin-top:4px}
.sim-result-box.hl{border-left-color:var(--cyan)}
.sim-result-box.hl .val{color:var(--cyan)}

/* 목표 역산 계산기 */
.goal-card{background:linear-gradient(135deg,rgba(6,182,212,.07),rgba(139,92,246,.05));border:1px solid rgba(6,182,212,.28);border-radius:16px;padding:22px 26px;margin-bottom:26px}
.goal-card .tit{font-size:var(--fs-sm);font-weight:800;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.goal-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:800px){.goal-inputs{grid-template-columns:1fr}}
.goal-input-box{display:flex;flex-direction:column;gap:6px}
.goal-input-box label{font-size:var(--fs-xs);color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.goal-input-box input{background:#0a1422;border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--cyan);font-size:15px;font-weight:700;text-align:right;outline:none;width:100%}
.goal-input-box input:focus{border-color:var(--cyan)}
.goal-result{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:14px;border-top:1px solid var(--bdr);margin-top:8px}
@media(max-width:640px){.goal-result{grid-template-columns:1fr}}
.goal-result-box{padding:14px 16px;border-radius:10px;background:var(--alt)}
.goal-result-box .lbl{font-size:var(--fs-xs);color:var(--t3);font-weight:700;margin-bottom:4px}
.goal-result-box .val{font-size:22px;font-weight:900;line-height:1.1;letter-spacing:-.5px}
.goal-result-box.pos .val{color:var(--grn)}
.goal-result-box.neg .val{color:var(--red)}
.goal-result-box.neu .val{color:var(--cyan)}
.goal-result-box .sub{font-size:var(--fs-xs);color:var(--t3);margin-top:6px;line-height:1.5}
.goal-hint{margin-top:12px;padding:10px 14px;background:rgba(6,182,212,.07);border-radius:8px;font-size:12px;color:var(--t2);line-height:1.6}
.goal-hint b{color:var(--cyan)}

/* 저축률 추이 차트 */
.sr-trend{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:18px 22px;margin-bottom:26px}
.sr-trend-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:var(--fs-sm);font-weight:800}
.sr-trend-hd .avg{margin-left:auto;font-size:var(--fs-xs);color:var(--t3);font-weight:600}
.sr-trend-hd .avg b{color:var(--cyan);font-weight:700}
.sr-trend-wrap{position:relative;height:180px}

/* 지출 히트맵 */
.heatmap-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:18px 22px;margin-bottom:26px;overflow-x:auto}
.heatmap-card .hd{font-size:var(--fs-sm);font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.heatmap-card .hd .legend{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3);font-weight:600}
.heatmap-card .hd .legend .sq{width:14px;height:14px;border-radius:3px}
.hm-table{border-collapse:separate;border-spacing:3px;min-width:100%}
.hm-table th,.hm-table td{padding:0;font-size:11px;text-align:center}
.hm-table th{font-weight:700;color:var(--t3);padding:2px 6px}
.hm-table th.cat-name{text-align:left;min-width:100px;padding-left:0}
.hm-cell{width:42px;height:28px;border-radius:4px;color:var(--t1);font-weight:700;font-size:10px;font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;justify-content:center;cursor:default}
.hm-cell.empty{background:rgba(255,255,255,.02);color:var(--t3)}

/* ── v7: 도움말 모달 ── */
.help-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;border:none;font-size:22px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(6,182,212,.45);z-index:90;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.help-fab:hover{transform:translateY(-2px) scale(1.05)}
.help-fab::after{content:'도움말';position:absolute;right:64px;top:50%;transform:translateY(-50%);background:var(--card);color:var(--t1);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid var(--bdr);opacity:0;pointer-events:none;transition:opacity .15s}
.help-fab:hover::after{opacity:1}
.help-overlay{position:fixed;inset:0;background:rgba(7,16,31,.85);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.help-overlay.on{display:flex}
.help-modal{max-width:800px;width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:helpIn .2s ease-out}
@keyframes helpIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.help-hd{padding:22px 28px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(59,130,246,.04))}
.help-hd h2{font-size:20px;font-weight:800;letter-spacing:-.3px;flex:1;margin:0}
.help-hd .close{background:transparent;border:1px solid var(--bdr);color:var(--t2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center}
.help-hd .close:hover{border-color:var(--red);color:var(--red)}
.help-bd{padding:22px 28px;max-height:calc(100vh - 180px);overflow-y:auto}
.help-sec{margin-bottom:26px}
.help-sec:last-child{margin-bottom:4px}
.help-sec h3{font-size:14px;font-weight:800;color:var(--cyan);letter-spacing:.02em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.help-sec p, .help-sec li{font-size:13px;line-height:1.75;color:var(--t2)}
.help-sec ul{list-style:none;padding:0}
.help-sec li{padding:6px 0 6px 22px;position:relative}
.help-sec li::before{content:'▸';position:absolute;left:6px;color:var(--t3);font-size:11px;top:10px}
.help-sec li b{color:var(--t1);font-weight:700}
.help-sec .kbd{display:inline-block;padding:2px 8px;border:1px solid var(--bdr);border-radius:5px;font-size:11px;font-family:ui-monospace,monospace;color:var(--t1);background:var(--alt);margin:0 2px;font-weight:700}
.help-sec .step{display:flex;gap:14px;padding:10px 14px;margin-bottom:8px;background:var(--alt);border-radius:10px;border-left:3px solid var(--cyan)}
.help-sec .step .num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--cyan);color:#000;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.help-sec .step .txt{font-size:13px;color:var(--t1);line-height:1.65}
.help-sec .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:var(--alt);color:var(--t2);border:1px solid var(--bdr);margin-right:4px}
.help-sec .ft{padding:10px 14px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:9px;font-size:12px;color:var(--amb);line-height:1.7}
.help-sec .ft b{color:#fcd34d}
.help-tabs{display:flex;gap:2px;padding:10px 18px 0;background:var(--card);border-bottom:1px solid var(--bdr);overflow-x:auto}
.help-tabs button{padding:9px 14px;border-radius:7px 7px 0 0;border:none;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:var(--t3);white-space:nowrap}
.help-tabs button.on{background:var(--alt);color:var(--t1)}
.help-page{display:none}
.help-page.on{display:block}
@media(max-width:640px){.help-fab{bottom:16px;right:16px;width:46px;height:46px;font-size:20px}.help-hd{padding:16px 20px}.help-bd{padding:16px 20px}}

/* ── v7: 아카이브 ── */
.arch-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.15);border-radius:10px;margin-bottom:18px;flex-wrap:wrap}
.arch-bar .cnt{font-size:var(--fs-xs);color:var(--t3);font-weight:700}
.arch-bar .cnt b{color:var(--t1)}
.arch-bar button{padding:5px 13px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--t2);font-size:var(--fs-xs);font-weight:700;cursor:pointer}
.arch-bar button.on{background:rgba(148,163,184,.18);color:var(--t1);border-color:rgba(148,163,184,.3)}
.ir.archived{opacity:.45;background:rgba(148,163,184,.04)}
.ir.archived input{color:var(--t3)!important}
.ir.archived .nm{text-decoration:line-through;color:var(--t3)}
.arch-btn{background:none;border:1px solid var(--bdr);border-radius:5px;color:var(--t3);font-size:10px;font-weight:700;padding:2px 7px;cursor:pointer;line-height:1.2;white-space:nowrap;transition:all .15s}
.arch-btn:hover{border-color:var(--amb);color:var(--amb)}
.arch-btn.on{background:rgba(245,158,11,.15);color:var(--amb);border-color:rgba(245,158,11,.35)}

/* ── v7: 카테고리 요약 (컴팩트) ── */
.cat-sum{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:18px 22px;margin-bottom:26px}
.cat-sum-title{font-size:var(--fs-sm);font-weight:700;color:var(--t1);margin-bottom:14px}
.cat-sum-title small{color:var(--t3);font-weight:400;margin-left:6px;font-size:var(--fs-xs)}
.cat-sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){.cat-sum-grid{grid-template-columns:1fr}}
.cat-sum-col{border-left:3px solid;padding:10px 14px 12px;border-radius:6px;background:rgba(255,255,255,.015)}
.cat-sum-hd{display:flex;justify-content:space-between;align-items:baseline;font-size:var(--fs-md);font-weight:800;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed rgba(255,255,255,.06)}
.cat-sum-row{display:grid;grid-template-columns:130px 1fr 90px;gap:10px;align-items:center;font-size:var(--fs-xs);padding:4px 0;color:var(--t2)}
.cat-sum-row .nm{font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-sum-row .bar-wrap{height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;position:relative}
.cat-sum-row .bar{display:block;height:100%;border-radius:3px;opacity:.7;transition:width .5s}
.cat-sum-row .amt{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;color:var(--t1)}

/* ── v7: 마일스톤 진척 ── */
.ms-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:26px}
@media(max-width:800px){.ms-grid{grid-template-columns:1fr}}
.ms-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px 20px}
.ms-label{font-size:var(--fs-xs);color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.ms-val{font-size:20px;font-weight:var(--fw-black);letter-spacing:-.3px;margin-bottom:6px}
.ms-sub{font-size:var(--fs-xs);color:var(--t3);margin-bottom:10px;min-height:14px}
.ms-prog-bg{height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;margin-bottom:6px}
.ms-prog-fill{height:100%;border-radius:4px;transition:width .6s}
.ms-pct{font-size:var(--fs-xs);font-weight:700;text-align:right}

/* ── v6: Mobile responsive ── */
@media(max-width:800px){.g2,.mn{grid-template-columns:1fr;padding:20px 20px}}
@media(max-width:640px){
  .hdr{padding:12px 16px;flex-wrap:wrap;gap:10px}
  .hdr-left h1{font-size:16px}
  .tabs{padding:6px 12px}
  .tabs button{padding:6px 12px;font-size:12px}
  .mn{padding:16px 12px}
  .rw{gap:8px;margin-bottom:18px}
  .kp{padding:12px 14px;min-width:calc(50% - 4px)}
  .kp strong{font-size:16px}
  .sec-hd{padding:16px 18px}
  .sec-hd .sec-label,.sec-hd .sec-total{font-size:18px}
  .sec-body{padding:14px 16px 18px}
  .ir{padding:10px 10px 10px 18px;gap:8px;flex-wrap:wrap}
  .ir input{width:130px;padding:7px 10px;font-size:13px}
  .cr{padding:8px 10px;font-size:12px;gap:6px}
  .vc,.vi{padding:6px 10px;font-size:12px}
  .vi{padding-left:18px}
  .idr{flex-wrap:wrap;gap:8px 12px}
  .idr .n{flex:0 0 90px}
  .idr .v{flex:0 0 80px;font-size:16px}
  .idr .d{flex:1 0 100%;order:10}
  .bkt{padding:14px 16px}
  .eur-bar{padding:10px 14px;gap:8px}
  .sim-ctrl{padding:12px 14px;gap:10px}
  .sim-ctrl input[type=number]{width:90px}
  .sim-ctrl input[type=range]{width:120px}
  .pd-filter{margin-left:0;margin-top:6px}
  table{font-size:11px}
  th,td{padding:6px 6px}
  .hs{display:none}
}
</style>

</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1><em>₩</em> 개인 재무제표</h1>
    <div class="sub">양상운 가계 — 자산 증식 인사이트</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="hs" id="hs"></div>
    <span id="progress-info" class="progress-info" style="font-size:11px;color:var(--t3)"></span>

function deltaBadge(cur,prev,invert){

}

// 복리 미래가치: PV + PMT(월저축)을 연수익률 r%로 N개월 굴렸을 때
function compoundFV(pv,pmt,annualRate,months){
  const r=annualRate/100/12;
  if(r===0||!isFinite(r))return pv+pmt*months;
  const g=Math.pow(1+r,months);
  return pv*g+pmt*(g-1)/r;
}
// 역산: 목표 FV 달성에 필요한 월 저축액
function requiredPmt(pv,fv,annualRate,months){
  const r=annualRate/100/12;
  if(r===0||!isFinite(r))return (fv-pv)/months;
  const g=Math.pow(1+r,months);
  return (fv-pv*g)*r/(g-1);
}
// 역산: 현재 PMT·PV로 목표 FV 달성에 필요한 연수익률 (이분법)
function requiredRate(pv,pmt,fv,months){
  if(pv>=fv)return 0;
  if(months<=0)return Infinity;
  let lo=-10,hi=30;
  for(let i=0;i<60;i++){
    const mid=(lo+hi)/2;
    const f=compoundFV(pv,pmt,mid,months);
    if(f<fv)lo=mid;else hi=mid;
  }
  return (lo+hi)/2;
}
// 72의 법칙 — 연수익률로 자산 2배 되는 연수
function yearsToDouble(rate){return rate>0?72/rate:null}

// 자산 증가 원천 분해: 각 월별 ΔNW = 순수익(저축) + 자본이득(잔여)
function growthAttribution(tl){
  return tl.map((d,i)=>{
    if(i===0)return{ym:d.ym,save:0,gain:0,total:0};
    const prev=tl[i-1];
    const dNw=d.nw-prev.nw;
    const save=d.ni;
    const gain=dNw-save;
    return{ym:d.ym,save,gain,total:dNw};
  });
}

  const passive=rental+invest;
  return{passive,exp:lt.exp,ratio:passive/lt.exp,rental,invest};
}

// 카테고리 × 월 지출 히트맵 매트릭스 (최근 12개월)
function expenseHeatmap(tl){
  const months=tl.slice(-12);
  const cats=SC.exp.map(g=>g.cat);
  const rate=getRate();
  const matrix=cats.map(cat=>{
    const g=SC.exp.find(x=>x.cat===cat);
    const row={cat,cells:[]};
    months.forEach(m=>{
      const vals=AD[m.ym]?.vals||{};
      let sum=0;
      if(g){
        g.items.filter(i=>i!=='__eur_rate__').forEach(i=>{
          const v=parseFloat(vals[i])||0;
          sum+=isEur(i)?v*(parseFloat(vals['__eur_rate__'])||rate):v;
        });
      }
      row.cells.push({ym:m.ym,v:sum});
    });
    // 총합 제로인 카테고리는 제외
    row.total=row.cells.reduce((s,c)=>s+c.v,0);
    return row;
  }).filter(r=>r.total>0);
  // 각 행 내 최댓값 기준으로 색상 강도 계산
  matrix.forEach(r=>{
    const rMax=Math.max(...r.cells.map(c=>c.v),1);
    r.cells.forEach(c=>{c.intensity=rMax>0?c.v/rMax:0;});
  });
  return{months,matrix};
}

// 유휴 현금 (비상자금 6개월 초과분 → 투자 기회비용)
function idleCashAlert(lt){
  if(!lt)return{cash:0,need:0,excess:0,annualOpp:0};
  const cash=catTotalIncludes('ast','현금');
  const need=lt.exp*6;
  const excess=Math.max(0,cash-need);
  return{cash,need,excess,annualOpp:excess*0.05};
}

// 오늘의 행동 제안 — 상태 기반 최우선 1건
function todaysAction(tl,lt){
  if(!lt)return null;
  const ni=lt.rev-lt.exp;
  const sr=lt.rev>0?ni/lt.rev:-1;
  const pir=passiveIncomeRatio(lt);
  const idle=idleCashAlert(lt);
  const cash=catTotalIncludes('ast','현금');
  const emonths=lt.exp>0?cash/lt.exp:0;

  // 우선순위 1: 순수익 적자 → 지출 줄이기
  if(ni<0){
    const top=topExpenses(3);
    const target=top[0];
    const need=Math.abs(ni);
    return{
      icon:'🎯',
      tag:'이번 달 최우선',
      title:'적자 탈출 — 지출 구조 점검',
      body:`순수익 <b>${fmt(ni)}</b> 적자. 최대 지출 <b>${target?target.item.replace(/\s*\(€\)\s*$/,''):'—'}</b> 등에서 <b>${fmt(need)}</b> 절감하면 흑자 전환.`,
      cta:`월지출 10% 감소 시 → 연 <b>${fmt(lt.exp*.1*12)}</b> 추가 저축 가능`
    };
  }
  // 우선순위 2: 비상자금 < 3개월
  if(emonths<3){
    return{
      icon:'🛡️',
      tag:'방어 우선',
      title:'비상자금 먼저 쌓기',
      body:`현재 비상자금 <b>${emonths.toFixed(1)}개월분</b>. 투자보다 현금 확보가 우선 — 최소 3~6개월 목표.`,
      cta:`목표 6개월까지 <b>${fmt(lt.exp*6-cash)}</b> 추가 필요`
    };
  }
  // 우선순위 3: 유휴 현금 큼 → 투자 기회
  if(idle.excess>50000000){
    return{
      icon:'💰',
      tag:'기회비용',
      title:'유휴 현금 투자 이동',
      body:`비상자금(6개월분) 초과 <b>${fmt(idle.excess)}</b>이 예금에 잠자고 있습니다. 연 수익률 격차가 누적되면 큰 손실.`,
      cta:`연 5% 운용 시 → 연 <b>${fmt(idle.annualOpp)}</b> 추가 수익 확보`
    };
  }
  // 우선순위 4: 저축률 20% 미달
  if(sr<0.2&&sr>=0){
    const gap=(0.2-sr)*lt.rev;
    return{
      icon:'📈',
      tag:'습관 개선',
      title:`저축률 ${(sr*100).toFixed(1)}% → 20% 도전`,
      body:`목표까지 월 <b>${fmt(gap)}</b> 더 저축 필요. 작은 고정비부터 줄이는 것이 효과적.`,
      cta:`20% 달성 시 → 연 <b>${fmt(0.2*lt.rev*12-ni*12)}</b> 추가 자산 축적`
    };
  }
  // 우선순위 5: 수동 소득 낮음
  if(pir.ratio<0.1){
    return{
      icon:'🏦',
      tag:'증식 전략',
      title:'수동 소득 키우기',
      body:`월세·이자·배당 비율 <b>${(pir.ratio*100).toFixed(1)}%</b>. 장기적으로 자산이 지출을 커버하는 구조로 전환 필요.`,
      cta:`배당주·월세 수익 부동산 비중 늘리기 검토`
    };
  }
  // 기본 — 복리 강조
  const avg=tl.slice(-6).length?tl.slice(-6).reduce((s,d)=>s+d.ni,0)/tl.slice(-6).length:0;
  const fv5=compoundFV(lt.nw,avg,5,60);
  return{
    icon:'🚀',
    tag:'꾸준함의 힘',
    title:'복리의 마법',
    body:`현재 페이스 + 연 5% 수익률 유지 시 5년 후 순자본 약 <b>${fmt(fv5)}</b>.`,
    cta:`월 저축 10%만 늘려도 5년 누적 차이 크게 벌어짐`
  };
}

// 지출 TOP N (전월 대비 델타 포함)
function topExpenses(n=6){
  const rows=[];
  SC.exp.forEach(g=>{
    g.items.filter(i=>i!=='__eur_rate__').forEach(i=>{
      const v=toKRW(i,parseFloat(VL[i])||0);
      if(v>0)rows.push({item:i,cat:g.cat,v});
    });
  });
  // 전월 데이터에서 같은 항목 조회
  const tl=getTL();
  const prevEntry=tl.length>=2?AD[tl[tl.length-2].ym]:null;
  const prevVL=prevEntry?.vals||{};
  rows.forEach(r=>{
    const pv=prevVL[r.item]!=null?toKRW(r.item,parseFloat(prevVL[r.item])||0):null;
    r.prev=pv;r.delta=pv!=null?r.v-pv:null;
  });
  return rows.sort((a,b)=>b.v-a.v).slice(0,n);
}

// 재무 건전성 종합 점수 (0~100)
function healthScore(lt){
  if(!lt)return{score:0,grade:'—',breakdown:[]};
  const cash=catTotalIncludes('ast','현금');
  const ni=lt.rev-lt.exp;
  const mDebt=computeMonthlyDebt();
  const emonths=lt.exp>0?cash/lt.exp:0;
  const debtRatio=lt.nw>0?lt.liab/lt.nw:99;
  const nwRatio=lt.asset>0?lt.nw/lt.asset:0;
  const saveRate=lt.rev>0?ni/lt.rev:-1;
  const dsr=lt.rev>0?mDebt/lt.rev:1;

  const items=[
    {n:'비상자금',    raw:emonths,   max:25, f:v=>v.toFixed(1)+'개월',
      score:emonths>=6?25:emonths>=3?18:emonths>=1?8:0,
      pct:Math.min(100,emonths/6*100), c:'#10b981'},
    {n:'저축률',      raw:saveRate,  max:25, f:v=>(v*100).toFixed(1)+'%',
      score:saveRate>=.2?25:saveRate>=.1?15:saveRate>=0?8:0,
      pct:Math.max(0,Math.min(100,(saveRate+.1)/.3*100)), c:'#06b6d4'},
    {n:'부채비율',    raw:debtRatio, max:20, f:v=>(v*100).toFixed(1)+'%',
      score:debtRatio<=.5?20:debtRatio<=1?14:debtRatio<=1.5?7:0,
      pct:Math.max(0,Math.min(100,(1.5-debtRatio)/1.5*100)), c:'#f59e0b'},
    {n:'순자본비율',  raw:nwRatio,   max:20, f:v=>(v*100).toFixed(1)+'%',
      score:nwRatio>=.5?20:nwRatio>=.3?12:nwRatio>=.1?5:0,
      pct:Math.min(100,nwRatio*200), c:'#3b82f6'},
    {n:'DSR',         raw:dsr,       max:10, f:v=>(v*100).toFixed(1)+'%',
      score:dsr<=.3?10:dsr<=.4?6:dsr<=.6?3:0,
      pct:Math.max(0,Math.min(100,(.6-dsr)/.6*100)), c:'#a78bfa'}
  ];
  const total=items.reduce((s,x)=>s+x.score,0);
  const grade=total>=80?'A':total>=65?'B':total>=50?'C':total>=35?'D':'F';
  const color=total>=80?'#10b981':total>=65?'#06b6d4':total>=50?'#f59e0b':total>=35?'#f97316':'#ef4444';
  return{score:total,grade,color,breakdown:items};
}

// 자동 진단 한 줄씩 (이달의 인사이트)
function generateDiagnosis(tl,lt){
  if(!lt)return[{kind:'info',icon:'ℹ️',text:'데이터 입력 후 진단이 표시됩니다'}];
  const lines=[];
  const ni=lt.rev-lt.exp;
  const cash=catTotalIncludes('ast','현금');
  const emonths=lt.exp>0?cash/lt.exp:0;
  const saveRate=lt.rev>0?ni/lt.rev:-1;
  const debtRatio=lt.nw>0?lt.liab/lt.nw:0;

  // 1. 순수익 상태 — 가장 중요
  if(ni<0){
    const burnMonths=cash>0?Math.abs(cash/ni).toFixed(1):'—';
    lines.push({kind:'bad',icon:'🔴',text:`이달 순수익 <b>${fmt(ni)}</b> — 이 페이스가 지속되면 현금 <b>${burnMonths}개월</b> 후 소진`});
  } else if(saveRate>=.2){
    lines.push({kind:'good',icon:'🟢',text:`저축률 <b>${(saveRate*100).toFixed(1)}%</b> — 권장 20% 이상, 훌륭한 페이스`});
  } else if(saveRate>=0){
    lines.push({kind:'warn',icon:'🟡',text:`저축률 <b>${(saveRate*100).toFixed(1)}%</b> — 흑자 유지 중이나 20% 목표 미달`});
  }

  // 2. 비상자금
  if(emonths<3){
    lines.push({kind:'warn',icon:'⚠️',text:`비상자금 <b>${emonths.toFixed(1)}개월분</b> — WHO 권장 3~6개월 대비 부족, 현금 확보 필요`});
  } else if(emonths>=6){
    lines.push({kind:'good',icon:'✅',text:`비상자금 <b>${emonths.toFixed(1)}개월분</b> — 충분, 초과분은 투자 이동 고려 가능`});
  }

  // 3. 자산 구성 편중
  const alloc=assetAllocation();
  if(alloc.total>0){
    const realEst=alloc.buckets.find(b=>b.name==='부동산');
    const reShare=realEst?realEst.v/alloc.total*100:0;
    if(reShare>65){
      lines.push({kind:'warn',icon:'🏠',text:`부동산 비중 <b>${reShare.toFixed(1)}%</b> — 포트폴리오 편중, 유동성 점검 필요`});
    }
  }

  // 4. 지출 증가 감지 — 전월 대비 TOP 증가 항목
  const topExp=topExpenses(20);
  const increased=topExp.filter(r=>r.delta!=null&&r.delta>100000).sort((a,b)=>b.delta-a.delta)[0];
  if(increased){
    lines.push({kind:'info',icon:'📈',text:`이달 <b>${increased.item.replace(/\s*\(€\)\s*$/,'')}</b> 전월 대비 <b>+${fmt(increased.delta)}</b> 증가`});
  }

  // 5. 부채비율
  if(debtRatio>1){
    lines.push({kind:'warn',icon:'💸',text:`부채비율 <b>${(debtRatio*100).toFixed(1)}%</b> — 순자본 대비 부채 과다, 상환 가속 권장`});
  }

  // 6. 대출 상환 여력 (상환 시 월 부담 소멸 효과)
  const plan=computePlan();
  if(plan.clearDebt>0){
    const monthlySaved=computeMonthlyDebt();
    lines.push({kind:'info',icon:'💡',text:`대출 전액 상환 시 → 월 <b>${fmt(monthlySaved)}</b> 이자·원금 부담 소멸 (현재 잔액 ${fmt(plan.clearDebt)})`});
  }

  // 7. 순자본 추세
  if(tl.length>=12){
    const y0=tl[tl.length-12].nw,y1=lt.nw;
    const growth=y0!==0?((y1-y0)/Math.abs(y0)*100):0;
    const absAmt=y1-y0;
    if(Math.abs(growth)>=3){
      const icon=growth>0?'📊':'📉';
      const kind=growth>0?'good':'bad';
      lines.push({kind,icon,text:`최근 12개월 순자본 <b>${growth>0?'+':''}${growth.toFixed(1)}%</b> (${fmt(absAmt)})`});
    }
  }

  return lines.slice(0,6);
}

/* 월 목록 — 통합 (25.07 ~ 30.12) */
function getMonths(){
  const out=[];
  for(let y=2025,m=7;;){
    out.push(`${String(y).slice(2)}.${String(m).padStart(2,'0')}`);
    if(y===2030&&m===12)break;
    m++;if(m>12){m=1;y++;}
  }
  return out;
}

function getTL(){
  // 히스토리 + 저장된 모든 달 통합
  const histYms=new Set(HIST.map(h=>h.ym));
  const allYms=new Set([...HIST.map(h=>h.ym),...Object.keys(AD),...getMonths()]);
  return[...allYms].sort().map(ym=>{
    const d=AD[ym]||{};const h=HIST.find(x=>x.ym===ym)||{};
    return{ym,rev:d.rev||h.rev||0,exp:d.exp||h.exp||0,ni:(d.rev||h.rev||0)-(d.exp||h.exp||0),asset:d.asset||h.asset||0,liab:d.liab||h.liab||0,nw:(d.asset||h.asset||0)-(d.liab||h.liab||0)}
  }).filter(d=>d.rev||d.exp||d.asset)
}
function getYears(tl){return[...new Set(tl.map(d=>d.ym.slice(0,2)))].sort()}
function getYearData(tl,yr){return tl.filter(d=>d.ym.startsWith(yr))}
function yearSummary(months){
  return{
    rev:months.reduce((a,d)=>a+d.rev,0),
    exp:months.reduce((a,d)=>a+d.exp,0),
    ni:months.reduce((a,d)=>a+d.ni,0),
    asset:months[months.length-1]?.asset||0,
    liab:months[months.length-1]?.liab||0,
    nw:months[months.length-1]?.nw||0,
  }
}

function kpi(l,v,c,sub,w,dlt){
  return`<div class="kp${w?" w":""}"><small>${l}</small><strong style="color:${c}">${v}</strong>${sub?`<div class="sub">${sub}</div>`:""}${dlt||""}</div>`;
}
function setPeriod(n){PERIOD=n;Object.values(CH).forEach(c=>c.destroy());CH={};draw();}
function setInputView(v){INPUT_VIEW=v;d1();}
function setDashView(v){DASH_VIEW=v;Object.values(CH).forEach(c=>c.destroy());CH={};draw();}
function setSimRate(r){SIM_RATE=r;Object.values(CH).forEach(c=>c.destroy());CH={};draw();}
function setGoal(field,val){
  GOAL_PLAN[field]=val;
  sSet('goal_plan',GOAL_PLAN);
  draw();
}

function draw(){
  const tl=getTL(),lt=tl.length?tl[tl.length-1]:null;
  const tabs=TABS();
  document.getElementById("hs").innerHTML=lt?[["자산",fmt(lt.asset),"var(--blue)"],["부채",fmt(lt.liab),"var(--red)"],["순자본",fmt(lt.nw),"var(--cyan)"]].map(([l,v,c])=>`<div><small>${l}</small><b style="color:${c}">${v}</b></div>`).join(""):"";
  document.getElementById("tabs").innerHTML=tabs.map((t,i)=>`<button class="${i===CT?"on":""}" onclick="setT(${i})">${t}</button>`).join("");
  document.getElementById("mn").innerHTML=tabs.map((_,i)=>`<div class="pg${CT===i?" on":""}" id="p${i}"></div>`).join("");
  [d0,d1,dYearly,dAnnualGoals,dMilestones,d3][CT](tl,lt);

  const pi=document.getElementById('progress-info');

}

/* ══ 탭0: 대시보드 (v8 — 증식/방어 관점 이중 레이아웃) ══ */
function d0(tl,lt){
  if(!lt)return;

  // ── A. 오늘의 행동 제안 (최상단 · 모든 관점 공통) ──
  const action=todaysAction(tl,lt);

  h+=`<div class="view-toggle-wrap">
    <div class="view-toggle">

  // ── D. KPI 6개 ──
  h+=`<div class="rw">

    // 2. 수동 소득 비율

    // 4. 복리 시뮬레이션 강화
    const recent6=tl.slice(-6);

    const monthlySaveEff=SIM_CFG.monthlySave!=null?SIM_CFG.monthlySave:avgNi6;
    const simMonths=SIM_CFG.months||60;
    const simIsAuto=SIM_CFG.monthlySave==null;

    // 6. 저축률 12개월 추이
    const srSeries=savingsRateSeries(tl);

    h+=`<div class="sr-trend">
      <div class="sr-trend-hd">📉 저축률 추이 <span class="avg">12개월 평균 <b>${(avgSr*100).toFixed(1)}%</b> (목표: 20%)</span></div>
      <div class="sr-trend-wrap"><canvas id="cSr"></canvas></div>

    // 7. 지출 히트맵
    const hm=expenseHeatmap(tl);
    if(hm.matrix.length&&hm.months.length){
      h+=`<div class="heatmap-card">

    h+=`<div class="g2">

    h+=`<div class="alloc-wrap">
      <div class="alloc-card">
        <div class="alloc-hd">🥧 자산 구성 (${fmt(alloc.total)})</div>
        <div class="alloc-bd" style="display:grid;grid-template-columns:180px 1fr;gap:20px;align-items:center">
          <div style="position:relative;height:180px"><canvas id="cDonut"></canvas></div>
          <div class="alloc-legend">
            ${alloc.buckets.sort((a,b)=>b.v-a.v).map(b=>{
              const pct=alloc.total>0?(b.v/alloc.total*100).toFixed(1):0;
              return`<div class="row"><span class="dot" style="background:${b.c}"></span><span>${b.name}</span><span class="pct">${pct}%</span><span class="amt">${fmt(b.v)}</span></div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="alloc-card">
        <div class="alloc-hd">💧 이달 현금흐름 (${lt.ym})</div>
        <div class="alloc-bd">
          ${cf.steps.map(s=>{
            const pct=Math.min(100,Math.abs(s.v)/cfMax*100);
            const label=s.kind==='in'?'+'+fmt(s.v):s.kind==='net'?(s.v>=0?'+':'')+fmt(s.v):'-'+fmt(s.v);
            return`<div class="wf-row${s.kind==='net'?' wf-total-row':''}"><span class="n">${s.n}</span><div class="wf-bar-bg"><div class="wf-bar" style="left:0;width:${pct}%;background:${s.c};opacity:${s.kind==='out'?.55:1}"></div></div><span class="v" style="color:${s.c}">${label}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;

    // 3. 마일스톤
    const ms=milestones(tl,lt);
    h+=`<div class="ms-grid">`;
    ms.forEach(m=>{
      const pct=m.target>0?Math.min(100,Math.round(m.val/m.target*100)):0;
      const progress=m.invert?100-pct:pct;
      const displayPct=m.invert?100-pct:pct;
      h+=`<div class="ms-card">
        <div class="ms-label">${m.label}</div>
        <div class="ms-val" style="color:${m.c}">${m.invert?fmt(m.target-m.val):fmt(m.val)}${m.invert?' 상환':''}</div>
        <div class="ms-sub">${m.sub}</div>
        <div class="ms-prog-bg"><div class="ms-prog-fill" style="width:${progress}%;background:${m.c}"></div></div>
        <div class="ms-pct" style="color:${m.c}">${displayPct}% ${displayPct>=100?'✅':''}</div>
      </div>`;
    });
    h+=`</div>`;

    // 4. 지출 TOP
    const topExp=topExpenses(8);
    h+=`<div class="top-exp">
      <div class="top-exp-title">🔥 이달 지출 TOP ${topExp.length} <span style="color:var(--t3);font-weight:400">· 전월 대비</span></div>
      ${topExp.map(r=>{
        let dHtml='<span class="d flat">—</span>';
        if(r.delta!=null){
          if(r.delta===0)dHtml='<span class="d flat">동일</span>';
          else{const up=r.delta>0;dHtml=`<span class="d ${up?'up':'dn'}">${up?'▲':'▼'} ${fmt(Math.abs(r.delta))}</span>`;}
        } else if(r.prev==null)dHtml='<span class="d flat">신규</span>';
        return`<div class="top-exp-row"><span class="n">${r.item.replace(/\s*\(€\)\s*$/,'')}<small>${r.cat}</small></span><span class="v">${fmt(r.v)}</span>${dHtml}</div>`;
      }).join('')}
    </div>`;

    // 5. 차트 2개
    const pdLabel=PERIOD===0?"전체":`최근 ${PERIOD}개월`;
    const pdBtns=[3,6,12,0].map(n=>`<button class="${PERIOD===n?"on":""}" onclick="setPeriod(${n})">${n===0?"전체":n+"M"}</button>`).join("");
    h+=`<div class="g2">
      <div class="cd"><div class="ch"><div class="dt" style="background:var(--blue)"></div><b>수익 vs 지출 (${pdLabel})</b><div class="pd-filter">${pdBtns}</div></div><div class="cb"><div class="cw"><canvas id="c1"></canvas></div></div></div>
      <div class="cd"><div class="ch"><div class="dt" style="background:var(--cyan)"></div><b>순자본 추이</b></div><div class="cb"><div class="cw"><canvas id="c2"></canvas></div></div></div>
    </div>`;
  }

  // ── X. 공통 하단: 최근 메모 + 카테고리 요약 ──
  const recentMemos=Object.entries(MONTH_MEMOS)
    .filter(([,v])=>v?.trim())
    .sort(([a],[b])=>b.localeCompare(a))
    .slice(0,3);
  if(recentMemos.length){
    h+=`<div style="background:var(--alt);border-radius:14px;border:1px solid rgba(6,182,212,.2);padding:16px 22px;margin-bottom:28px">
      <div style="font-size:13px;font-weight:600;color:var(--cyan);margin-bottom:12px">📝 최근 월 메모</div>
      ${recentMemos.map(([m,v])=>`<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bdr)"><span style="font-size:11px;font-weight:700;color:var(--t3);margin-right:10px">${m}</span><span style="font-size:13px;color:var(--t2);white-space:pre-wrap;line-height:1.6">${v.trim()}</span></div>`).join('')}
    </div>`;
  }
  h+=`<div class="cat-sum">
    <div class="cat-sum-title">📋 카테고리 요약 <small>· 상세 편집은 <a onclick="setT(1)" style="color:var(--cyan);cursor:pointer;text-decoration:underline">월별입력 탭</a></small></div>
    <div class="cat-sum-grid">`;
  ["rev","exp","ast","lib"].forEach(s=>{
    const c=CC[s],lb=LL[s],t=s==="ast"?lt.asset:s==="lib"?lt.liab:s==="rev"?lt.rev:lt.exp;
    const cats=SC[s].map(g=>({cat:g.cat,sub:g.items.filter(i=>i!=='__eur_rate__').reduce((a,i)=>a+toKRW(i,parseFloat(VL[i])||0),0)})).filter(x=>x.sub!==0).sort((a,b)=>Math.abs(b.sub)-Math.abs(a.sub));
    const shareOf=t||1;
    h+=`<div class="cat-sum-col" style="border-color:${c}33">
      <div class="cat-sum-hd" style="color:${c}"><span>${lb}</span><span>${fmt(t)}</span></div>
      ${cats.map(x=>{const pct=Math.min(100,Math.abs(x.sub)/Math.abs(shareOf)*100);return`<div class="cat-sum-row"><span class="nm">${x.cat}</span><span class="bar-wrap"><span class="bar" style="width:${pct}%;background:${c}"></span></span><span class="amt">${fmt(x.sub)}</span></div>`;}).join('')}
    </div>`;
  });
  h+=`</div></div>`;
  p.innerHTML=h;

  // ─────────────── 차트 렌더 ───────────────
  const sliced=PERIOD===0?tl:tl.slice(-PERIOD);
  const recent6=tl.slice(-6);
  const avgNi6=recent6.length?Math.round(recent6.reduce((a,d)=>a+d.ni,0)/recent6.length):0;
  const monthlySaveEff=SIM_CFG.monthlySave!=null?SIM_CFG.monthlySave:avgNi6;
  const simMonths=SIM_CFG.months||60;

  if(DASH_VIEW==='growth'){
    // (1) 자산 증가 원천 분해 누적 막대
    const attrib=growthAttribution(tl).slice(-12);
    CH.cAttrib=new Chart(document.getElementById("cAttrib"),{
      type:'bar',
      data:{labels:attrib.map(d=>d.ym),datasets:[
        {label:'저축',data:attrib.map(d=>d.save),backgroundColor:'#10b981',stack:'a',borderRadius:3},
        {label:'자본이득',data:attrib.map(d=>d.gain),backgroundColor:'#3b82f6',stack:'a',borderRadius:3}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8da4bf',font:{size:11}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}}},scales:{x:{stacked:true,ticks:{color:'#4a6180',font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:'#4a6180',font:{size:10},callback:v=>Math.abs(v)>=100000000?(v/100000000).toFixed(0)+'억':Math.abs(v)>=10000000?(v/10000000).toFixed(0)+'천만':v},grid:{color:'#1a2d46'}}}}
    });
    // (2) 저축률 추이
    const sr=savingsRateSeries(tl);
    CH.cSr=new Chart(document.getElementById("cSr"),{
      type:'line',
      data:{labels:sr.map(d=>d.ym),datasets:[
        {label:'저축률',data:sr.map(d=>(d.rate*100)),borderColor:'#06b6d4',backgroundColor:'rgba(6,182,212,.15)',borderWidth:2.5,pointRadius:3,fill:true,tension:.3},
        {label:'목표 20%',data:sr.map(()=>20),borderColor:'#10b981',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8da4bf',font:{size:11}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`}}},scales:{x:{ticks:{color:'#4a6180',font:{size:10}},grid:{color:'#1a2d46'}},y:{ticks:{color:'#4a6180',font:{size:10},callback:v=>v+'%'},grid:{color:'#1a2d46'}}}}
    });
  } else {
    // 건전성 게이지
    const hs=healthScore(lt);
    CH.cHealth=new Chart(document.getElementById("cHealth"),{
      type:'doughnut',
      data:{datasets:[{data:[hs.score,100-hs.score],backgroundColor:[hs.color,'rgba(255,255,255,.05)'],borderWidth:0,circumference:180,rotation:270,cutout:'75%'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}}}
    });
    // 자산 구성 도넛
    const alloc=assetAllocation();
    const allocSorted=alloc.buckets.slice().sort((a,b)=>b.v-a.v);
    CH.cDonut=new Chart(document.getElementById("cDonut"),{
      type:'doughnut',
      data:{labels:allocSorted.map(b=>b.name),datasets:[{data:allocSorted.map(b=>b.v),backgroundColor:allocSorted.map(b=>b.c),borderColor:'#07101f',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.parsed)}`}}}}
    });
  }

  // 공통: 수익/지출 + 순자본 예측 (복리 기반)
  CH.c1=new Chart(document.getElementById("c1"),{type:"bar",data:{labels:sliced.map(d=>d.ym),datasets:[{label:"수익",data:sliced.map(d=>d.rev),backgroundColor:"#3b82f6",borderRadius:4,barPercentage:.45},{label:"지출",data:sliced.map(d=>d.exp),backgroundColor:"#ef4444",borderRadius:4,barPercentage:.45},{label:"순수익",data:sliced.map(d=>d.ni),type:"line",borderColor:"#f59e0b",borderWidth:2,pointRadius:3,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8da4bf",font:{size:12}}}},scales:{x:{ticks:{color:"#4a6180",font:{size:11}},grid:{color:"#1a2d46"}},y:{ticks:{color:"#4a6180",font:{size:11},callback:v=>Math.abs(v)>=100000000?(v/100000000).toFixed(0)+"억":Math.abs(v)>=10000000?(v/10000000).toFixed(0)+"천만":v},grid:{color:"#1a2d46"}}}}});

  // 순자본 복리 예측
  const fcstMonths=Math.min(simMonths,36);
  const lastNw=tl[tl.length-1].nw;
  const allMonths=getMonths();
  const lastYm=tl[tl.length-1].ym;
  const idx=allMonths.indexOf(lastYm);
  const futureLabels=idx>=0?allMonths.slice(idx+1,idx+1+fcstMonths):[];
  const fcstLabels=[...tl.map(d=>d.ym),...futureLabels];
  // 복리 기반 예측선
  const rateForChart=DASH_VIEW==='growth'?SIM_RATE:0;
  const fcstData=[...tl.map(()=>null)];
  fcstData[fcstData.length-1]=lastNw;
  for(let i=1;i<=futureLabels.length;i++){
    fcstData.push(compoundFV(lastNw,monthlySaveEff,rateForChart,i));
  }
  // 참고선: 0% (저축만)
  const zeroData=[...tl.map(()=>null)];
  zeroData[zeroData.length-1]=lastNw;
  for(let i=1;i<=futureLabels.length;i++){
    zeroData.push(compoundFV(lastNw,monthlySaveEff,0,i));
  }
  const datasets=[
    {label:"순자본",data:[...tl.map(d=>d.nw),...futureLabels.map(()=>null)],borderColor:"#06b6d4",borderWidth:2.5,pointRadius:0,fill:false,spanGaps:false},
    {label:"자산",data:[...tl.map(d=>d.asset),...futureLabels.map(()=>null)],borderColor:"#10b981",borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false},
    {label:"부채",data:[...tl.map(d=>d.liab),...futureLabels.map(()=>null)],borderColor:"#ef4444",borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false},
    {label:`예측 (${rateForChart}% 복리)`,data:fcstData,borderColor:"#8b5cf6",borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false,spanGaps:true}
  ];
  if(DASH_VIEW==='growth'&&rateForChart>0){
    datasets.push({label:"예측 (저축만 0%)",data:zeroData,borderColor:"#64748b",borderWidth:1.5,borderDash:[3,3],pointRadius:0,fill:false,spanGaps:true});
  }
  CH.c2=new Chart(document.getElementById("c2"),{type:"line",data:{labels:fcstLabels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#8da4bf",font:{size:11}}}},scales:{x:{ticks:{color:"#4a6180",font:{size:10},maxTicksLimit:12},grid:{color:"#1a2d46"}},y:{ticks:{color:"#4a6180",font:{size:11},callback:v=>Math.abs(v)>=100000000?(v/100000000).toFixed(0)+"억":v},grid:{color:"#1a2d46"}}}}});
}

/* ══ 탭1: 월별입력 ══ */
function d1(){
  const p=document.getElementById("p1"),rT=ss("rev"),eT=ss("exp"),aT=ss("ast"),lT=ss("lib");
  const months=getMonths();
  const opts=months.map(m=>{const has=AD[m]?.vals;return`<option value="${m}"${m===EM?" selected":""}>${m}${has?" ✓":""}</option>`}).join("");
  const viewOn=(v,lbl,color)=>`<button onclick="setInputView('${v}')" style="padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:var(--fs-sm);font-weight:700;background:${INPUT_VIEW===v?color:'var(--alt)'};color:${INPUT_VIEW===v?'#000':'var(--t2)'}">${lbl}</button>`;
  let h=`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px">
    <span style="font-size:14px;font-weight:600;color:var(--t2)">입력 월</span>

    <button class="sv" onclick="doSave()">💾 저장</button>
    <button class="pf" onclick="printPDF()">📄 PDF</button>
    <label class="pf" style="cursor:pointer" title="엑셀 양식에서 이달 데이터를 불러옵니다">

      <input type="file" accept=".xlsx" style="display:none" onchange="importExcel(this)">
    </label>
    <span id="sm" style="color:var(--grn);font-size:13px;font-weight:600"></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap">
    <span style="font-size:var(--fs-xs);color:var(--t3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-right:4px">뷰</span>
    ${viewOn('pl','💰 손익 (수익·지출)','var(--grn)')}
    ${viewOn('bs','🏦 재무상태 (자산·부채)','var(--blue)')}
    <span style="margin-left:auto;font-size:var(--fs-xs);color:var(--t3)">${INPUT_VIEW==='pl'?'매월 업데이트':'분기·반기 단위 재평가'}</span>
  </div>`;

  // v6: EUR rate bar — 항상 표시 (유로 항목이 없으면 환율만 저장)
  {
    const rate=getRate();
    h+=`<div class="eur-bar">
      <label>€ 1 =</label>
      <input class="eur-rate-input" type="number" value="${rate}" id="eur-rate-inp"
        oninput="VL['__eur_rate__']=this.value;document.getElementById('eur-rate-disp').textContent=Number(this.value).toLocaleString()+'원';d1()"
        title="이달 적용 환율 (원/€)">
      <span style="font-size:14px;color:#fbbf24;font-weight:700">원</span>
      <span class="eur-badge">이달 적용 환율</span>
      <span style="font-size:12px;color:var(--t3);margin-left:4px">€ 항목은 이 환율로 원화 환산됩니다 — 출국 전이면 0으로 두면 됩니다</span>
      <span style="margin-left:auto;font-size:13px;color:var(--t2)">현재: <b id="eur-rate-disp" style="color:#fbbf24">${rate.toLocaleString()}원</b></span>
    </div>`;
  }

  h+=`<div class="ht">카테고리명·항목명 <b>클릭</b> → 이름 수정 &nbsp;|&nbsp; <b>+</b> → 항목 추가 &nbsp;|&nbsp; <b>✕</b> → 삭제 &nbsp;|&nbsp; <b>📦</b> → 아카이브(종료·매각 항목을 UI에서 숨김, 데이터 보존) &nbsp;|&nbsp; 금액: 원화는 <b>원</b>, 유로는 <b>€</b></div>`;

  // v7: 아카이브 바
  const archN=countArchived();
  if(archN>0){
    h+=`<div class="arch-bar">
      <span style="font-size:16px">📦</span>
      <span class="cnt">아카이브된 항목 <b>${archN}</b>개 — 상환/매각 완료된 자산·부채 (과거값은 그대로 보존)</span>
      <button class="${SHOW_ARCHIVED?'on':''}" style="margin-left:auto" onclick="toggleShowArchived()">${SHOW_ARCHIVED?'아카이브 숨기기':'아카이브 보기'}</button>
    </div>`;
  }

  // 월 메모
  const memoVal=(MONTH_MEMOS[EM]||'').replace(/"/g,'&quot;');
  const memoHas=!!MONTH_MEMOS[EM]?.trim();
  h+=`<div style="background:var(--alt);border-radius:14px;border:1px solid ${memoHas?'rgba(6,182,212,.35)':'var(--bdr)'};padding:16px 22px;margin-bottom:28px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:13px;font-weight:600;color:${memoHas?'var(--cyan)':'var(--t3)'}">${EM} 월 메모</span>
      ${memoHas?`<span style="font-size:11px;background:rgba(6,182,212,.15);color:var(--cyan);padding:2px 9px;border-radius:10px">작성됨</span>`:''}
    </div>
    <textarea
      id="month-memo"
      rows="3"
      placeholder="이달 특이사항, 큰 지출 이유, 투자 결정, 기억할 것 등 자유롭게 적어두세요..."
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';saveMonthMemo(this.value)"
      style="width:100%;background:transparent;border:none;outline:none;font-size:14px;color:var(--t1);font-family:inherit;resize:none;line-height:1.7;min-height:72px"
    >${memoVal}</textarea>
  </div>`;
  // v6: 뷰별 KPI — 선택된 뷰의 3개 지표만 강조, 나머지는 참고용 축약
  if(INPUT_VIEW==='pl'){
    h+=`<div class="rw">
      ${kpi("수익",fmt(rT),"var(--grn)")}
      ${kpi("지출",fmt(eT),"var(--red)")}
      ${kpi("순수익",fmt(rT-eT),rT-eT>=0?"var(--grn)":"var(--red)","저축률 "+(rT>0?((rT-eT)/rT*100).toFixed(1):'—')+"%",rT-eT<0)}
      ${kpi("참고 — 자산",fmt(aT),"var(--t3)","재무상태 뷰에서 편집")}
      ${kpi("참고 — 부채",fmt(lT),"var(--t3)","재무상태 뷰에서 편집")}
    </div>`;
  } else {
    h+=`<div class="rw">
      ${kpi("자산",fmt(aT),"var(--blue)")}
      ${kpi("부채",fmt(lT),"var(--red)")}
      ${kpi("순자본",fmt(aT-lT),"var(--cyan)","부채비율 "+(aT-lT>0?(lT/(aT-lT)*100).toFixed(1):'—')+"%")}
      ${kpi("참고 — 수익",fmt(rT),"var(--t3)","손익 뷰에서 편집")}
      ${kpi("참고 — 지출",fmt(eT),"var(--t3)","손익 뷰에서 편집")}
    </div>`;
  }

  const secBg2={rev:"rgba(16,185,129,.07)",exp:"rgba(239,68,68,.07)",ast:"rgba(59,130,246,.07)",lib:"rgba(245,158,11,.07)"};
  const secBdr2={rev:"rgba(16,185,129,.22)",exp:"rgba(239,68,68,.22)",ast:"rgba(59,130,246,.22)",lib:"rgba(245,158,11,.22)"};
  const visibleSecs=INPUT_VIEW==='pl'?["rev","exp"]:["ast","lib"];

  visibleSecs.forEach(s=>{
    const c=CC[s],lb=LL[s],t=ss(s);
    h+=`<div class="sec-cd" style="background:${secBg2[s]};border-color:${secBdr2[s]}">
      <div class="sec-hd" style="background:${secBg2[s]};border-bottom:1px solid ${secBdr2[s]}">

    SC[s].forEach((g,gi)=>{

        +`<span class="nm" onclick="renC('${s}',${gi})">${g.cat}</span>`
        +`<span class="st" style="color:${c}">${isEurCat?'€→':''}${commas(Math.round(sub))}</span>`
        +`<button onclick="addI('${s}',${gi})">+</button>`
        +`<button class="x" onclick="delC('${s}',${gi})">✕</button></div>`;
      g.items.filter(i=>i!=='__eur_rate__').forEach((it,ii)=>{

        if(isArch&&!SHOW_ARCHIVED)return;
        const esc=it.replace(/'/g,"\\'").replace(/"/g,"&quot;");
        const eurItem=isEur(it);
        const rawVal=parseFloat(VL[it]||0);

        h+=`<div class="ir-wrap">
          <div class="ir${eurItem?' eur':''}${isArch?' archived':''}">
            <span class="nm" onclick="renI('${s}',${gi},${ii})">${it.replace(/\s*\(€\)\s*$/,'')}</span>

              onfocus="this.value=String(this.value).replace(/,/g,'')"
              onblur="const r=parseInput(this.value);VL['${esc}']=r;this.value=r?fmtInput(r):''"
              oninput="VL['${esc}']=parseInput(this.value);const eq=this.parentElement.querySelector('.eur-equiv');if(eq)eq.textContent=this.value?'≈ ₩'+Math.round(parseInput(this.value)*${getRate()}).toLocaleString():''">
            <span class="u">${eurItem?'€':'원'}</span>
            ${eurItem?`<span class="eur-equiv">${equiv}</span>`:''}
            ${archBtn}
            <button class="x" onclick="delI('${s}',${gi},${ii})">✕</button>
          </div>
          <textarea class="item-tip-input" rows="1" placeholder="메모 / 확인처 / 팁 (선택)"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';saveTip('${tipKey.replace(/'/g,"\\'")}',this.value)">${tipVal}</textarea>
        </div>`;
      });

    h+=`<div class="sf" style="border-top:1px solid ${secBdr2[s]}">

    </div></div></div>`;
  });
  p.innerHTML=h;
}

/* ══ 탭5: 건전성 ══ */

  const p=document.getElementById("p5"),ni=lt.rev-lt.exp;

  const cash=SC.ast.reduce((s,g)=>g.cat.includes("현금")?s+g.items.reduce((a,i)=>a+(parseFloat(VL[i])||0),0):s,0);
  const mDebt=computeMonthlyDebt();
  const ind=[
    {n:"부채비율",v:lt.nw>0?lt.liab/lt.nw:0,f:v=>(v*100).toFixed(1)+"%",s:"100%↓",d:"부채÷순자본",ok:v=>v<=1,wn:v=>v<=1.5},
    {n:"순자본비율",v:lt.asset>0?lt.nw/lt.asset:0,f:v=>(v*100).toFixed(1)+"%",s:"50%↑",d:"순자본÷자산",ok:v=>v>=.5,wn:v=>v>=.3},
    {n:"비상자금",v:lt.exp>0?cash/lt.exp:0,f:v=>v.toFixed(1)+"개월",s:"3~6개월",d:"현금÷월지출",ok:v=>v>=3,wn:v=>v>=1},
    {n:"저축률",v:lt.rev>0?ni/lt.rev:0,f:v=>(v*100).toFixed(1)+"%",s:"20%↑",d:"순수익÷수익",ok:v=>v>=.2,wn:v=>v>=0},
    {n:"DSR",v:lt.rev>0?mDebt/lt.rev:0,f:v=>(v*100).toFixed(1)+"%",s:"40%↓",d:`(이자+원금 ${fmt(mDebt)})÷수익`,ok:v=>v<=.3,wn:v=>v<=.4},
  ];
  let h=`<div class="cd"><div class="ch"><div class="dt" style="background:var(--grn)"></div><b>건전성 지표</b></div><div class="cb">`;
  ind.forEach(x=>{const ok=x.ok(x.v),wn=!ok&&x.wn(x.v),cl=ok?"#10b981":wn?"#f59e0b":"#ef4444",bd=ok?"양호":wn?"주의":"위험";
    h+=`<div class="idr" style="border:1px solid ${cl}22"><div class="n">${x.n}</div><div class="v" style="color:${cl}">${x.f(x.v)}</div><div class="s">${x.s}</div><div class="d">${x.d}</div><span class="bdg" style="background:${cl}22;color:${cl}">${bd}</span></div>`;
  });
  h+=`</div></div>`;p.innerHTML=h;
}

  let h=`<div class="cd"><div class="ch"><div class="dt" style="background:var(--amb)"></div><b>20${yr}년 월별 상세</b><span style="margin-left:auto;font-size:var(--fs-xs);color:var(--t3)">${months.length}개월</span></div><div class="cb" style="overflow-x:auto"><table>

  months.forEach((d,i)=>{

      <td>${commas(d.asset)}</td><td>${commas(d.liab)}</td>

/* ══ 탭3: 연간목표 ══ */
const GOAL_COLORS=['#06b6d4','#10b981','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#ec4899','#f97316'];
function dAnnualGoals(){
  const p=document.getElementById("p3");
  const years=['2025','2026','2027','2028','2029','2030'];
  let h=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px">`;
  years.forEach(yr=>{
    const goals=YEAR_GOALS[yr]||[];
    const done=goals.filter(g=>g.done).length;
    h+=`<div style="background:var(--alt);border-radius:10px;padding:12px 18px;border:1px solid var(--bdr);cursor:pointer;min-width:110px;text-align:center" onclick="setGoalYear('${yr}')">
      <div style="font-size:var(--fs-xl);font-weight:var(--fw-black);color:${GOAL_YEAR===yr?'var(--cyan)':'var(--t2)'}">${yr}</div>
      <div style="font-size:var(--fs-xs);color:var(--t3);margin-top:4px">${goals.length}개 목표${goals.length?` · ${done}완료`:''}</div>
    </div>`;
  });
  h+=`</div>`;

  const yr=GOAL_YEAR||'2025';
  const goals=YEAR_GOALS[yr]||[];
  const doneCount=goals.filter(g=>g.done).length;
  const pct=goals.length?Math.round(doneCount/goals.length*100):0;

  h+=`<div class="sec-cd" style="background:rgba(6,182,212,.05);border-color:rgba(6,182,212,.2)">
    <div class="sec-hd" style="background:rgba(6,182,212,.07);border-bottom:1px solid rgba(6,182,212,.2)">
      <span class="sec-label" style="color:var(--cyan)">${yr}년 목표</span>
      <div style="display:flex;align-items:center;gap:14px">
        <span style="font-size:var(--fs-lg);font-weight:var(--fw-black);color:var(--cyan)">${doneCount}/${goals.length}</span>
        <button onclick="addGoal('${yr}')" style="padding:7px 16px;border-radius:8px;border:1px solid rgba(6,182,212,.4);background:rgba(6,182,212,.1);color:var(--cyan);font-size:var(--fs-sm);font-weight:var(--fw-bold);cursor:pointer">+ 목표 추가</button>
      </div>
    </div>
    <div class="sec-body">`;

  if(goals.length){
    h+=`<div style="background:rgba(255,255,255,.05);border-radius:4px;height:6px;margin-bottom:20px;overflow:hidden"><div style="height:100%;border-radius:4px;background:var(--cyan);width:${pct}%;transition:width .4s"></div></div>`;
    goals.forEach((g,i)=>{
      const cc=g.color||GOAL_COLORS[i%GOAL_COLORS.length];
      const tgt=parseFloat(g.target||0),cur=parseFloat(g.current||0);
      const gpct=tgt>0?Math.min(100,Math.round(cur/tgt*100)):null;
      const hasAmt=tgt>0||cur>0;
      h+=`<div style="display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:12px;margin-bottom:8px;background:${g.done?'rgba(255,255,255,.03)':'var(--alt)'};border:1px solid ${g.done?'rgba(16,185,129,.2)':cc+'33'};${g.done?'opacity:.6':''}">
        <div onclick="toggleGoal('${yr}',${i})" style="width:22px;height:22px;border-radius:7px;border:2px solid ${g.done?'#10b981':cc};background:${g.done?'#10b981':'transparent'};flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#fff">${g.done?'✓':''}</div>
        <div style="flex:1">
          <div style="font-size:var(--fs-md);font-weight:var(--fw-med);color:${g.done?'var(--t3)':'var(--t1)'};${g.done?'text-decoration:line-through':''};cursor:pointer" onclick="editGoalTitle('${yr}',${i})">${g.title}</div>
          ${g.note?`<div style="font-size:var(--fs-xs);color:var(--t3);margin-top:4px;line-height:1.5;cursor:pointer" onclick="editGoalNote('${yr}',${i})">${g.note}</div>`:`<div style="font-size:var(--fs-xs);color:rgba(74,97,128,.5);margin-top:4px;cursor:pointer" onclick="editGoalNote('${yr}',${i})">세부 내용 추가...</div>`}
          <div class="gl-amt-row">
            <span>현재</span>
            <input class="gl-amt-input" type="text" inputmode="decimal" value="${fmtInput(cur)}" placeholder="0"
              onfocus="this.value=String(this.value).replace(/,/g,'')"
              onblur="this.value=fmtInput(this.value)"
              onchange="setGoalAmt('${yr}',${i},'current',parseInput(this.value))">
            <span>/ 목표</span>
            <input class="gl-amt-input" type="text" inputmode="decimal" value="${fmtInput(tgt)}" placeholder="0"
              onfocus="this.value=String(this.value).replace(/,/g,'')"
              onblur="this.value=fmtInput(this.value)"
              onchange="setGoalAmt('${yr}',${i},'target',parseInput(this.value))">
            <span>원</span>
            ${hasAmt&&gpct!=null?`<span style="margin-left:auto;font-weight:700;color:${gpct>=100?'var(--grn)':cc}">${gpct}%</span>`:''}
          </div>
          ${hasAmt&&gpct!=null?`<div class="gl-prog"><div class="gl-prog-bar"><div class="gl-prog-fill" style="width:${gpct}%;background:${gpct>=100?'var(--grn)':cc}"></div></div></div>`:''}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <div style="width:10px;height:10px;border-radius:50%;background:${cc};cursor:pointer" onclick="cycleGoalColor('${yr}',${i})" title="색상 변경"></div>
          <button onclick="delGoal('${yr}',${i})" style="background:none;border:none;cursor:pointer;color:rgba(239,68,68,.4);font-size:var(--fs-sm);padding:0 4px">✕</button>
        </div>
      </div>`;
    });
  } else {
    h+=`<div style="text-align:center;padding:40px;color:var(--t3);font-size:var(--fs-md)">
      ${yr}년 목표가 없습니다.<br>
      <span style="font-size:var(--fs-sm)">위 "+ 목표 추가" 버튼으로 추가하세요</span>
    </div>`;
  }
  h+=`</div></div>`;
  p.innerHTML=h;
}

let GOAL_YEAR='2025';
function setGoalYear(yr){GOAL_YEAR=yr;dAnnualGoals();}
function saveGoals(){sSet('yr_goals',YEAR_GOALS);}
function addGoal(yr){
  const title=prompt(`${yr}년 새 목표:`);
  if(!title?.trim())return;
  if(!YEAR_GOALS[yr])YEAR_GOALS[yr]=[];
  YEAR_GOALS[yr].push({title:title.trim(),note:'',done:false,color:GOAL_COLORS[YEAR_GOALS[yr].length%GOAL_COLORS.length]});
  saveGoals();dAnnualGoals();
}
function toggleGoal(yr,i){YEAR_GOALS[yr][i].done=!YEAR_GOALS[yr][i].done;saveGoals();dAnnualGoals();}
function delGoal(yr,i){if(!confirm('삭제할까요?'))return;YEAR_GOALS[yr].splice(i,1);saveGoals();dAnnualGoals();}
function editGoalTitle(yr,i){
  const n=prompt('목표 제목:',YEAR_GOALS[yr][i].title);
  if(!n?.trim())return;
  YEAR_GOALS[yr][i].title=n.trim();saveGoals();dAnnualGoals();
}
function editGoalNote(yr,i){
  const n=prompt('세부 내용:',YEAR_GOALS[yr][i].note||'');
  if(n===null)return;
  YEAR_GOALS[yr][i].note=n.trim();saveGoals();dAnnualGoals();
}
function cycleGoalColor(yr,i){
  const cur=GOAL_COLORS.indexOf(YEAR_GOALS[yr][i].color);
  YEAR_GOALS[yr][i].color=GOAL_COLORS[(cur+1)%GOAL_COLORS.length];
  saveGoals();dAnnualGoals();
}
function setGoalAmt(yr,i,field,val){
  YEAR_GOALS[yr][i][field]=val;
  saveGoals();dAnnualGoals();
}

/* ══ 탭4: 계획·버킷 (v7 — 체크리스트 제거, 자금흐름 요약 + 버킷만) ══ */
function dMilestones(tl,lt){
  const p=document.getElementById("p4");
